<form method="post" action="{{ url_for('social.create_post') }}" enctype="multipart/form-data" class="composer">
  <textarea name="body" rows="4" maxlength="2000" placeholder="What is happening?"></textarea>
  <div class="composer-preview" data-media-preview hidden>
    <div class="composer-preview-frame" data-media-preview-frame></div>
    <div class="composer-preview-meta">
      <span data-media-preview-name></span>
      <button type="button" class="link-button" data-media-preview-clear>Remove</button>
    </div>
  </div>
  <div id="poll-fields" hidden>
    <input name="poll_option_1" maxlength="100" placeholder="Option 1">
    <input name="poll_option_2" maxlength="100" placeholder="Option 2">
    <input name="poll_option_3" maxlength="100" placeholder="Option 3 (optional)">
    <input name="poll_option_4" maxlength="100" placeholder="Option 4 (optional)">
    <p id="poll-error" style="color:red;display:none;">A poll needs at least 2 options.</p>
  </div>
  <div class="composer-actions">
    <label class="file-picker">
      <span>Attach image/video</span>
      <input type="file" name="media" accept="image/*,video/*" data-media-input>
    </label>
    <button type="button" id="poll-toggle">Add Poll</button>
    <button type="submit">Post</button>
  </div>
</form>
<script>
  var pollFields = document.getElementById('poll-fields');
  var pollError = document.getElementById('poll-error');

  document.getElementById('poll-toggle').addEventListener('click', function () {
    pollFields.hidden = !pollFields.hidden;
    this.textContent = pollFields.hidden ? 'Add Poll' : 'Remove Poll';
    if (pollFields.hidden) {
      pollFields.querySelectorAll('input').forEach(function (input) { input.value = ''; });
      pollError.style.display = 'none';
    }
  });

  document.querySelector('form.composer').addEventListener('submit', function (e) {
    if (pollFields.hidden) return;
    var filled = Array.from(pollFields.querySelectorAll('input')).filter(function (i) { return i.value.trim(); });
    if (filled.length === 1) {
      e.preventDefault();
      pollError.style.display = 'block';
    } else {
      pollError.style.display = 'none';
    }
  });
</script>
