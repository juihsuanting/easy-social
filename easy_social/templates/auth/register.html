{% extends "base.html" %}
{% block title %}Register - Easy Social{% endblock %}
{% block content %}
  <section class="auth-panel">
    <h1>Create account</h1>
    <form method="post" class="form-stack">
      <label>
        Username
        <input name="username" maxlength="40" autocomplete="username" required>
      </label>
      <label>
        Email
        <input name="email" type="email" autocomplete="email" required>
      </label>
      <label>
        Password
        <input name="password" type="password" autocomplete="new-password" required>
      </label>
      <input type="hidden" name="captcha_token" id="captcha-token" value="{{ captcha_token }}">
      <div class="captcha-group">
        <img src="{{ url_for('auth.captcha', token=captcha_token) }}" alt="CAPTCHA" id="captcha-img">
        <button type="button" id="captcha-refresh">Refresh</button>
      </div>
      <label>
        Enter the characters shown above
        <input name="captcha" autocomplete="off" required>
      </label>
      <button type="submit">Register</button>
    </form>
    <p class="muted">Already registered? <a href="{{ url_for('auth.login') }}">Log in</a>.</p>
  </section>
  <script>
    document.getElementById('captcha-refresh').addEventListener('click', function () {
      fetch('{{ url_for("auth.captcha_token_new") }}')
        .then(r => r.json())
        .then(data => {
          document.getElementById('captcha-img').src = data.url + '&t=' + Date.now();
          document.getElementById('captcha-token').value = data.token;
        });
    });
  </script>
{% endblock %}
